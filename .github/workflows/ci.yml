name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/marker
      APP_ORIGIN: https://marker.example.test
      SERVICE_NAME: marker-web-ci
      LOG_LEVEL: warn
      ENABLE_API_DOCS: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run quality:check
      - run: npm run build
